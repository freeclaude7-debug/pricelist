<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>네트워크 장비 가격표 & 주문</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Noto+Sans+KR:wght@300;400;500;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
<style>
  :root {
    --bg: #06090f;
    --surface: #0c1119;
    --surface2: #111827;
    --border: #1c2a3a;
    --border2: #223040;
    --accent: #00d4ff;
    --accent-glow: rgba(0,212,255,.25);
    --accent2: #00ff9d;
    --accent3: #3b82f6;
    --gold: #f59e0b;
    --text: #e8f0fe;
    --text2: #94a3b8;
    --muted: #4b6080;
    --danger: #ef4444;
    --success: #10b981;
    --tag-bg: rgba(0,212,255,.08);
    --row-hover: rgba(0,212,255,.04);
    --card-glow: 0 0 30px rgba(0,212,255,.15);
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }

  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
    transition: font-family 0.3s ease;
  }
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image:
      linear-gradient(rgba(0,212,255,.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,212,255,.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none; z-index: 0;
  }

  /* ─── 탑바 ─── */
  .topbar {
    position: sticky; top: 0; z-index: 50;
    background: rgba(6,9,15,.9);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border);
    padding: 0 clamp(16px,4vw,48px);
    display: flex; align-items: center; justify-content: space-between;
    height: clamp(52px,7vw,64px);
  }
  .logo {
    display: flex; align-items: center; gap: 10px;
    font-family: 'Syne', sans-serif;
    font-size: clamp(15px,2.2vw,18px); font-weight: 800;
    color: var(--text); text-decoration: none;
  }
  .cart-pill {
    display: flex; align-items: center; gap: 7px;
    padding: clamp(6px,1vw,8px) clamp(12px,2vw,16px);
    background: var(--surface2); border: 1px solid var(--border2); border-radius: 100px;
    cursor: pointer; font-family: 'JetBrains Mono', monospace;
    font-size: clamp(11px,1.4vw,13px); color: var(--text2);
    transition: all .2s; position: relative; white-space: nowrap;
  }
  .cart-pill.has-items { border-color: var(--gold); color: var(--gold); }
  .cart-badge {
    position: absolute; top: -6px; right: -6px;
    background: var(--gold); color: #000; border-radius: 100px;
    font-size: 10px; font-weight: 700; min-width: 18px; height: 18px;
    display: flex; align-items: center; justify-content: center; padding: 0 4px;
  }

  /* ─── 메인 컨텐츠 ─── */
  .wrap { position: relative; z-index: 1; max-width: 1100px; margin: 0 auto; padding: 0 clamp(16px,3vw,48px) 80px; }

  header { padding: clamp(36px,6vw,72px) 0 clamp(24px,4vw,48px); display: flex; flex-direction: column; gap: 12px; }
  .badge {
    display: inline-flex; align-items: center; gap: 8px;
    font-family: 'JetBrains Mono', monospace; font-size: 11px; letter-spacing: .12em; text-transform: uppercase;
    color: var(--accent); background: var(--tag-bg); border: 1px solid rgba(0,212,255,.2);
    padding: 6px 14px; border-radius: 100px; width: fit-content;
  }
  h1 {
    font-family: 'Syne', sans-serif; font-size: clamp(2rem,5vw,3.6rem);
    font-weight: 800; line-height: 1.1; letter-spacing: -.02em;
    background: linear-gradient(135deg, #fff 30%, var(--accent) 100%);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  }
  .subtitle { font-size: 14px; color: var(--muted); letter-spacing: .02em; font-weight: 300; }

  /* ─── 검색 + 필터 ─── */
  .controls { display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; }
  .row1 { display: flex; gap: 12px; align-items: center; }
  .swrap { flex: 1; position: relative; }
  .swrap input {
    width: 100%; padding: 11px 14px 11px 40px;
    background: var(--surface); border: 1px solid var(--border2); border-radius: 8px;
    color: var(--text); font-size: 14px; outline: none; transition: border-color .2s;
  }
  .swrap input:focus { border-color: var(--accent); }
  .row2 { display: flex; gap: 8px; flex-wrap: wrap; }
  .fbtn {
    padding: 8px 16px; background: var(--surface); border: 1px solid var(--border2); border-radius: 8px;
    color: var(--muted); font-size: 12px; cursor: pointer; transition: all .2s;
  }
  .fbtn.on { border-color: var(--accent); color: var(--accent); background: var(--tag-bg); }

  /* ─── 테이블 레이아웃 수정 핵심 ─── */
  .twrap { border: 1px solid var(--border); border-radius: 14px; overflow: hidden; box-shadow: var(--card-glow); }
  
  table { 
    width: 100%; 
    border-collapse: collapse; 
    table-layout: fixed; /* 고정 레이아웃 설정 */
  }

  thead tr { background: linear-gradient(135deg, #0d1a2e, #111e30); border-bottom: 1px solid var(--border2); }
  
  thead th {
    padding: clamp(10px,1.4vw,16px) clamp(12px,1.8vw,20px);
    text-align: left;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: .12em;
    color: var(--muted);
    cursor: pointer;
  }

  /* 컬럼별 너비 지정 */
  .cnum   { width: 50px; text-align: center; }
  .cmodel { width: auto; } /* 모델명은 남는 공간을 다 쓰되 자동 줄바꿈됨 */
  .cprice { width: 22%; text-align: right; }
  .ccat   { width: 18%; text-align: center; }
  .cact   { width: 100px; text-align: right; }

  tbody tr { border-bottom: 1px solid var(--border); transition: background .15s; }
  tbody tr:hover { background: var(--row-hover); }
  
  td { 
    padding: clamp(12px,1.6vw,16px) clamp(12px,1.8vw,20px); 
    font-size: 14px; 
    vertical-align: middle; 
  }

  /* 모델명 줄바꿈 설정 */
  .cmodel { 
    font-family: 'JetBrains Mono', monospace; 
    font-weight: 500; 
    white-space: normal;      /* 줄바꿈 허용 */
    word-break: break-all;    /* 긴 단어 강제 줄바꿈 */
    overflow-wrap: break-word; 
    line-height: 1.4;
  }

  .cnum { color: var(--muted); font-family: 'JetBrains Mono', monospace; font-size: 12px; }
  .cprice { font-family: 'Syne', sans-serif; font-weight: 700; color: var(--accent2); }
  
  .tag { 
    display: inline-block; padding: 3px 10px; border-radius: 100px; 
    font-size: 11px; font-family: 'JetBrains Mono', monospace; border: 1px solid; 
  }

  /* 담기 버튼 */
  .add-btn {
    display: inline-flex; align-items: center; gap: 5px;
    padding: 6px 12px;
    background: rgba(0,212,255,.08); border: 1px solid rgba(0,212,255,.25); border-radius: 8px;
    color: var(--accent); font-family: 'JetBrains Mono', monospace;
    font-size: 11px; cursor: pointer; transition: all .2s;
  }
  .add-btn.added { background: rgba(16,185,129,.1); border-color: rgba(16,185,129,.3); color: var(--success); }
  .add-btn.out { opacity: .35; pointer-events: none; }

  /* 나머지 스타일 생략... (사이드 패널, 폼 등 기존 코드와 동일) */
  .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.6); backdrop-filter: blur(4px); z-index: 100; }
  .overlay.open { display: block; }
  .cart-panel {
    position: fixed; top: 0; right: 0; width: min(480px, 100vw); height: 100%;
    background: var(--surface); border-left: 1px solid var(--border2); z-index: 101;
    display: flex; flex-direction: column; transform: translateX(100%); transition: transform .3s;
  }
  .cart-panel.open { transform: translateX(0); }
  .panel-head { padding: 20px; border-bottom: 1px solid var(--border2); display: flex; justify-content: space-between; align-items: center; }
  .panel-body { flex: 1; overflow-y: auto; padding: 20px; }
  .panel-footer { padding: 20px; border-top: 1px solid var(--border2); }
  #loading { position: fixed; inset: 0; background: var(--bg); z-index: 400; display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 16px; }
  #loading.hide { opacity: 0; pointer-events: none; }
  .spin { width: 32px; height: 32px; border: 2px solid var(--border2); border-top-color: var(--accent); border-radius: 50%; animation: sp .7s linear infinite; }
  @keyframes sp { to { transform: rotate(360deg); } }
  .pagination { display: flex; align-items: center; justify-content: space-between; margin-top: 16px; }
</style>
</head>
<body>

<div id="loading"><div class="spin"></div><div class="ltxt">데이터 불러오는 중...</div></div>

<header class="topbar">
  <div class="logo">NETWORK PRICE</div>
  <button class="cart-pill" id="cart-pill-btn" onclick="openCart()">
    장바구니 <span class="cart-badge" id="cart-badge" style="display:none">0</span>
  </button>
</header>

<div class="wrap">
  <header>
    <div class="badge">Live Pricing</div>
    <h1 id="site-title">Network Equipment<br>Price List</h1>
    <p class="subtitle" id="site-subtitle">모델명 클릭 시 자동 줄바꿈 및 균형 잡힌 레이아웃 적용 버전</p>
  </header>

  <div class="controls">
    <div class="row1">
      <div class="swrap">
        <input type="text" id="search" placeholder="모델명 검색...">
      </div>
    </div>
    <div class="row2" id="frow"></div>
  </div>

  <div class="twrap">
    <table>
      <thead><tr>
        <th class="cnum">#</th>
        <th data-sort="model" class="cmodel">MODEL</th>
        <th data-sort="price" class="cprice">가격 (VAT포함)</th>
        <th data-sort="cat" class="ccat">카테고리</th>
        <th class="cact">주문</th>
      </tr></thead>
      <tbody id="tbody"></tbody>
    </table>
  </div>

  <div class="pagination" id="pagination" style="display:none">
    <div id="pg-info" style="font-size:12px; color:var(--muted)"></div>
    <div id="pg-btns"></div>
  </div>
</div>

<div class="overlay" id="overlay" onclick="closeCart()"></div>
<div class="cart-panel" id="cart-panel">
  <div class="panel-head"><h3>🛒 주문서 작성</h3><button onclick="closeCart()" style="background:none;border:none;color:white;cursor:pointer">✕</button></div>
  <div class="panel-body" id="cart-items-wrap"></div>
  <div class="panel-footer">
    <button class="add-btn" style="width:100%; justify-content:center; padding:15px;" onclick="alert('데모 버전입니다.')">주문하기</button>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, doc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBLtR1pQsnrl4AJIsy1xkOu68l_jVbAo64",
  authDomain: "pricelist-61f5f.firebaseapp.com",
  projectId: "pricelist-61f5f",
  storageBucket: "pricelist-61f5f.firebasestorage.app",
  messagingSenderId: "1012022631154",
  appId: "1:1012022631154:web:0fb466191ed26c2f2b4e6b"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const PAL = [
  {c:'#00d4ff',b:'rgba(0,212,255,.3)',g:'rgba(0,212,255,.07)'},
  {c:'#a78bfa',b:'rgba(167,139,250,.3)',g:'rgba(167,139,250,.07)'},
  {c:'#fb923c',b:'rgba(251,146,60,.3)',g:'rgba(251,146,60,.07)'},
];

let DATA = [], CATS = [], CART = [];
let filterCat = 'all';

function renderPage() {
  const tb = document.getElementById('tbody');
  const q = document.getElementById('search').value.toLowerCase();
  const rows = DATA.filter(d => (filterCat === 'all' || d.cat === filterCat) && d.model.toLowerCase().includes(q));
  
  tb.innerHTML = rows.map((d, i) => {
    const p = PAL[i % PAL.length];
    return `
      <tr>
        <td class="cnum">${i + 1}</td>
        <td class="cmodel">${d.model}</td>
        <td class="cprice">${d.price.toLocaleString()}원</td>
        <td class="ccat"><span class="tag" style="color:${p.c};border-color:${p.b};background:${p.g}">${d.cat}</span></td>
        <td class="cact"><button class="add-btn">+ 담기</button></td>
      </tr>`;
  }).join('');
}

onSnapshot(doc(db, 'pricelist', 'data'), snap => {
  if (snap.exists()) {
    const d = snap.data();
    DATA = d.items || [];
    CATS = d.cats || [];
    renderPage();
  }
  document.getElementById('loading').classList.add('hide');
});

document.getElementById('search').oninput = renderPage;

window.openCart = () => document.getElementById('cart-panel').classList.add('open');
window.closeCart = () => document.getElementById('cart-panel').classList.remove('open');
</script>
</body>
</html>
