<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>네트워크 장비 가격표 & 주문</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Noto+Sans+KR:wght@300;400;500;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
<style>
  :root {
    --bg: #06090f;
    --surface: #0c1119;
    --surface2: #111827;
    --border: #1c2a3a;
    --border2: #223040;
    --accent: #00d4ff;
    --accent-glow: rgba(0,212,255,.25);
    --accent2: #00ff9d;
    --accent3: #3b82f6;
    --gold: #f59e0b;
    --text: #e8f0fe;
    --text2: #94a3b8;
    --muted: #4b6080;
    --danger: #ef4444;
    --success: #10b981;
    --tag-bg: rgba(0,212,255,.08);
    --row-hover: rgba(0,212,255,.04);
    --card-glow: 0 0 30px rgba(0,212,255,.15);
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }

  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image:
      linear-gradient(rgba(0,212,255,.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,212,255,.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none; z-index: 0;
  }

  /* ─── 탑바 ─── */
  .topbar {
    position: sticky; top: 0; z-index: 50;
    background: rgba(6,9,15,.9);
    backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border);
    padding: 0 clamp(16px,4vw,48px);
    display: flex; align-items: center; justify-content: space-between;
    height: 64px;
  }
  .logo { font-family: 'Syne', sans-serif; font-size: 18px; font-weight: 800; color: var(--text); text-decoration: none; }
  .cart-pill {
    display: flex; align-items: center; gap: 7px;
    padding: 8px 16px;
    background: var(--surface2); border: 1px solid var(--border2); border-radius: 100px;
    cursor: pointer; font-family: 'JetBrains Mono', monospace;
    font-size: 13px; color: var(--text2); transition: all .2s; position: relative;
  }
  .cart-pill.has-items { border-color: var(--gold); color: var(--gold); }
  .cart-badge {
    position: absolute; top: -6px; right: -6px;
    background: var(--gold); color: #000; border-radius: 100px;
    font-size: 10px; font-weight: 700; min-width: 18px; height: 18px;
    display: flex; align-items: center; justify-content: center;
  }

  .wrap { position: relative; z-index: 1; max-width: 1100px; margin: 0 auto; padding: 0 clamp(16px,3vw,48px) 80px; }

  header { padding: 48px 0 32px; display: flex; flex-direction: column; gap: 12px; }
  .badge {
    display: inline-flex; align-items: center; gap: 8px;
    font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--accent);
    background: var(--tag-bg); border: 1px solid rgba(0,212,255,.2);
    padding: 6px 14px; border-radius: 100px; width: fit-content;
  }
  h1 { font-family: 'Syne', sans-serif; font-size: clamp(2rem,5vw,3.6rem); font-weight: 800; line-height: 1.1; }

  /* ─── 통계 카드 (복구) ─── */
  .stats { display: flex; border: 1px solid var(--border); border-radius: 12px; overflow: hidden; margin-bottom: 32px; background: var(--surface); }
  .stat { flex: 1; padding: 20px 24px; border-right: 1px solid var(--border); }
  .stat:last-child { border-right: none; }
  .stat-l { font-size: 11px; color: var(--muted); text-transform: uppercase; margin-bottom: 6px; font-family: 'JetBrains Mono', monospace; }
  .stat-v { font-family: 'Syne', sans-serif; font-size: 1.5rem; font-weight: 700; color: var(--accent); }

  /* ─── 검색 ─── */
  .controls { margin-bottom: 24px; }
  .swrap input {
    width: 100%; padding: 14px 20px;
    background: var(--surface); border: 1px solid var(--border2); border-radius: 10px;
    color: var(--text); font-size: 15px; outline: none; transition: border-color .2s;
  }
  .swrap input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(0,212,255,.1); }

  /* ─── 테이블 정렬 및 간격 수정 ─── */
  .twrap { border: 1px solid var(--border); border-radius: 14px; overflow: hidden; box-shadow: var(--card-glow); background: var(--surface); }
  table { width: 100%; border-collapse: collapse; table-layout: fixed; } /* 고정 레이아웃 */

  thead tr { background: #0d141f; border-bottom: 1px solid var(--border2); }
  thead th {
    padding: 16px 20px; text-align: left;
    font-family: 'JetBrains Mono', monospace; font-size: 11px;
    text-transform: uppercase; letter-spacing: .1em; color: var(--muted);
  }

  /* 컬럼별 너비 및 정렬 명시 */
  .cnum   { width: 60px; text-align: center; }
  .cmodel { width: auto; text-align: left; } 
  .cprice { width: 200px; text-align: right; }
  .ccat   { width: 150px; text-align: center; }
  .cact   { width: 120px; text-align: right; }

  tbody tr { border-bottom: 1px solid var(--border); transition: background .15s; }
  tbody tr:hover { background: var(--row-hover); }
  
  td { padding: 18px 20px; font-size: 14px; vertical-align: middle; }

  /* 모델명 줄바꿈 및 강조 */
  .cmodel { 
    font-family: 'JetBrains Mono', monospace; font-weight: 700; color: var(--text);
    white-space: normal; word-break: break-all; line-height: 1.5; 
  }

  /* 가격 강조 */
  .cprice { font-family: 'Syne', sans-serif; font-weight: 800; color: var(--accent2); font-size: 16px; }

  /* 카테고리 태그 */
  .tag { 
    display: inline-block; padding: 4px 12px; border-radius: 100px; 
    font-size: 11px; font-family: 'Noto Sans KR', sans-serif; font-weight: 500; border: 1px solid; 
  }

  /* 담기 버튼 */
  .add-btn {
    display: inline-flex; align-items: center; justify-content: center; gap: 6px;
    padding: 8px 16px; width: 80px;
    background: rgba(0,212,255,.05); border: 1px solid rgba(0,212,255,0.3); border-radius: 8px;
    color: var(--accent); font-family: 'Noto Sans KR', sans-serif; font-weight: 600;
    font-size: 12px; cursor: pointer; transition: all .2s;
  }
  .add-btn:hover { background: var(--accent); color: #000; }
  .add-btn.added { background: rgba(16,185,129,.1); border-color: var(--success); color: var(--success); width: auto; }

  /* 로딩 및 기타 */
  #loading { position: fixed; inset: 0; background: var(--bg); z-index: 400; display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 16px; }
  #loading.hide { opacity: 0; pointer-events: none; transition: 0.5s; }
  .spin { width: 32px; height: 32px; border: 2px solid var(--border2); border-top-color: var(--accent); border-radius: 50%; animation: sp .7s linear infinite; }
  @keyframes sp { to { transform: rotate(360deg); } }

  @media (max-width: 768px) {
    .ccat { display: none; } /* 모바일에서 카테고리 숨김 */
    .cprice { width: 140px; }
  }
</style>
</head>
<body>

<div id="loading"><div class="spin"></div><div class="ltxt">데이터 동기화 중...</div></div>

<header class="topbar">
  <div class="logo">NETWORK PRO</div>
  <button class="cart-pill" id="cart-pill-btn">
    장바구니 <span class="cart-badge" id="cart-badge" style="display:none">0</span>
  </button>
</header>

<div class="wrap">
  <header>
    <div class="badge">Real-time Inventory</div>
    <h1 id="site-title">Network Equipment<br>Price List</h1>
  </header>

  <!-- 상단 통계 (복구됨) -->
  <div class="stats">
    <div class="stat"><div class="stat-l">전체 등록 모델</div><div class="stat-v" id="s-total">0</div></div>
    <div class="stat"><div class="stat-l">마지막 업데이트</div><div class="stat-v" id="lupd" style="font-size: 1rem; color: var(--text2);">--:--</div></div>
  </div>

  <div class="controls">
    <div class="swrap">
      <input type="text" id="search" placeholder="찾으시는 모델명을 입력하세요...">
    </div>
  </div>

  <div class="twrap">
    <table>
      <thead>
        <tr>
          <th class="cnum">#</th>
          <th class="cmodel">MODEL</th>
          <th class="cprice">가격 (VAT포함)</th>
          <th class="ccat">브랜드/분류</th>
          <th class="cact">주문</th>
        </tr>
      </thead>
      <tbody id="tbody">
        <!-- 데이터 로드 영역 -->
      </tbody>
    </table>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, doc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBLtR1pQsnrl4AJIsy1xkOu68l_jVbAo64",
  authDomain: "pricelist-61f5f.firebaseapp.com",
  projectId: "pricelist-61f5f",
  storageBucket: "pricelist-61f5f.firebasestorage.app",
  messagingSenderId: "1012022631154",
  appId: "1:1012022631154:web:0fb466191ed26c2f2b4e6b"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let DATA = [];
let CART = [];

const PAL = [
  {c:'#00d4ff',b:'rgba(0,212,255,.3)',g:'rgba(0,212,255,.07)'},
  {c:'#a78bfa',b:'rgba(167,139,250,.3)',g:'rgba(167,139,250,.07)'},
  {c:'#fb923c',b:'rgba(251,146,60,.3)',g:'rgba(251,146,60,.07)'},
  {c:'#34d399',b:'rgba(52,211,153,.3)',g:'rgba(52,211,153,.07)'}
];

function render() {
  const tb = document.getElementById('tbody');
  const q = document.getElementById('search').value.toLowerCase();
  const rows = DATA.filter(d => d.model.toLowerCase().includes(q));
  
  document.getElementById('s-total').textContent = DATA.length;
  document.getElementById('lupd').textContent = new Date().toLocaleTimeString('ko-KR', {hour12:false, hour:'2-digit', minute:'2-digit'});

  tb.innerHTML = rows.map((d, i) => {
    const p = PAL[i % PAL.length];
    const isAdded = CART.some(c => c.id === d.id);
    return `
      <tr>
        <td class="cnum">${i + 1}</td>
        <td class="cmodel">${d.model}</td>
        <td class="cprice">${Number(d.price).toLocaleString()}원</td>
        <td class="ccat"><span class="tag" style="color:${p.c};border-color:${p.b};background:${p.g}">${d.cat || '기타'}</span></td>
        <td class="cact">
          <button class="add-btn ${isAdded ? 'added' : ''}" onclick="window.toggleCart(${d.id})">
            ${isAdded ? '✓ 담김' : '+ 담기'}
          </button>
        </td>
      </tr>`;
  }).join('');
}

window.toggleCart = (id) => {
  const idx = CART.findIndex(c => c.id === id);
  if(idx > -1) CART.splice(idx, 1);
  else {
    const item = DATA.find(d => d.id === id);
    CART.push(item);
  }
  updateCartUI();
  render();
};

function updateCartUI() {
  const badge = document.getElementById('cart-badge');
  const pill = document.getElementById('cart-pill-btn');
  badge.textContent = CART.length;
  badge.style.display = CART.length > 0 ? 'flex' : 'none';
  if(CART.length > 0) pill.classList.add('has-items');
  else pill.classList.remove('has-items');
}

onSnapshot(doc(db, 'pricelist', 'data'), snap => {
  if (snap.exists()) {
    const d = snap.data();
    DATA = d.items || [];
    render();
  }
  document.getElementById('loading').classList.add('hide');
});

document.getElementById('search').oninput = render;
</script>
</body>
</html>
