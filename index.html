<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>네트워크 장비 가격표</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Noto+Sans+KR:wght@400;500;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #06090f;
    --surface: #0c1119;
    --border: #1c2a3a;
    --border2: #223040;
    --accent: #00d4ff;
    --accent2: #00ff9d;
    --text: #e8f0fe;
    --text2: #94a3b8;
    --muted: #4b6080;
    --tag-bg: rgba(0,212,255,.08);
    --card-glow: 0 0 30px rgba(0,212,255,.1);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    line-height: 1.6;
  }

  /* 격자 배경 */
  body::before {
    content: ''; position: fixed; inset: 0;
    background-image: linear-gradient(rgba(0,212,255,.03) 1px, transparent 1px), linear-gradient(90deg, rgba(0,212,255,.03) 1px, transparent 1px);
    background-size: 40px 40px; pointer-events: none; z-index: 0;
  }

  .wrap { position: relative; z-index: 1; max-width: 1100px; margin: 0 auto; padding: 40px 20px; }

  /* ─── 통계 (수정) ─── */
  .stats { 
    display: inline-block; 
    border: 1px solid var(--border); 
    border-radius: 12px; 
    padding: 20px 40px; 
    background: var(--surface); 
    margin-bottom: 30px;
  }
  .stat-l { font-size: 12px; color: var(--muted); text-transform: uppercase; margin-bottom: 8px; font-family: 'JetBrains Mono', monospace; letter-spacing: 1px; }
  .stat-v { font-family: 'Syne', sans-serif; font-size: 2.5rem; font-weight: 800; color: var(--accent); line-height: 1; }

  /* ─── 검색 및 카테고리 (추가) ─── */
  .controls { display: flex; flex-direction: column; gap: 15px; margin-bottom: 30px; }
  .swrap input {
    width: 100%; padding: 16px 24px;
    background: var(--surface); border: 1px solid var(--border2); border-radius: 12px;
    color: var(--text); font-size: 16px; outline: none; transition: 0.2s;
  }
  .swrap input:focus { border-color: var(--accent); box-shadow: 0 0 0 4px rgba(0,212,255,0.1); }

  .cat-row { display: flex; gap: 10px; flex-wrap: wrap; }
  .fbtn {
    padding: 8px 18px; background: var(--surface); border: 1px solid var(--border2); border-radius: 50px;
    color: var(--text2); font-size: 13px; cursor: pointer; transition: 0.2s; font-weight: 500;
  }
  .fbtn:hover { border-color: var(--accent); color: var(--accent); }
  .fbtn.on { background: var(--accent); color: #000; border-color: var(--accent); font-weight: 700; }

  /* ─── 테이블 정밀 교정 ─── */
  .twrap { border: 1px solid var(--border); border-radius: 16px; overflow: hidden; background: var(--surface); box-shadow: var(--card-glow); }
  table { width: 100%; border-collapse: collapse; table-layout: fixed; }

  thead tr { background: #0d141f; border-bottom: 1px solid var(--border2); }
  thead th {
    padding: 20px; font-family: 'JetBrains Mono', monospace; font-size: 12px;
    color: var(--muted); text-transform: uppercase; letter-spacing: 1px;
  }

  /* 컬럼 너비 고정 (헤더-본문 일치 핵심) */
  .cnum   { width: 60px; text-align: center; }
  .cmodel { width: auto; text-align: left; }
  .cprice { width: 220px; text-align: right; }
  .ccat   { width: 140px; text-align: center; }
  .cact   { width: 120px; text-align: right; }

  tbody tr { border-bottom: 1px solid var(--border); transition: 0.1s; }
  tbody tr:hover { background: rgba(0,212,255, 0.03); }
  td { padding: 20px; vertical-align: middle; }

  /* 데이터 스타일 */
  .cnum { color: var(--muted); font-family: 'JetBrains Mono', monospace; }
  .cmodel { 
    font-family: 'JetBrains Mono', monospace; font-weight: 700; color: var(--text); 
    white-space: normal; word-break: break-all; font-size: 15px;
  }
  .cprice { 
    font-family: 'Syne', sans-serif; font-weight: 800; color: var(--accent2); 
    font-size: 18px; letter-spacing: -0.5px;
  }
  .cprice .unit { font-size: 14px; margin-left: 2px; font-family: 'Noto Sans KR'; }

  /* 카테고리 태그 */
  .tag { 
    display: inline-block; padding: 4px 12px; border-radius: 50px; 
    font-size: 11px; font-weight: 700; border: 1px solid; background: rgba(0,0,0,0.2);
  }

  /* 버튼 */
  .add-btn {
    padding: 10px 16px; background: transparent; border: 1px solid rgba(0,212,255,0.4);
    border-radius: 8px; color: var(--accent); font-weight: 700; font-size: 12px;
    cursor: pointer; transition: 0.2s;
  }
  .add-btn:hover { background: var(--accent); color: #000; }
  .add-btn.added { background: var(--accent2); border-color: var(--accent2); color: #000; }

  #loading { position: fixed; inset: 0; background: var(--bg); z-index: 1000; display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 15px; transition: 0.5s; }
  #loading.hide { opacity: 0; pointer-events: none; }
  .spin { width: 40px; height: 40px; border: 3px solid var(--border2); border-top-color: var(--accent); border-radius: 50%; animation: sp .8s linear infinite; }
  @keyframes sp { to { transform: rotate(360deg); } }

  @media (max-width: 850px) {
    .ccat { display: none; }
    .cprice { width: 160px; }
  }
</style>
</head>
<body>

<div id="loading"><div class="spin"></div><div style="color:var(--muted); font-family:'JetBrains Mono'">LOADING DATA...</div></div>

<div class="wrap">
  <!-- 전체 등록 모델만 남김 -->
  <div class="stats">
    <div class="stat-l">전체 등록 모델</div>
    <div class="stat-v" id="s-total">0</div>
  </div>

  <div class="controls">
    <div class="swrap">
      <input type="text" id="search" placeholder="모델명을 입력하여 검색하세요...">
    </div>
    <!-- 카테고리 필터 영역 -->
    <div class="cat-row" id="cat-row">
      <button class="fbtn on" onclick="window.setFilter('all')">전체보기</button>
    </div>
  </div>

  <div class="twrap">
    <table>
      <thead>
        <tr>
          <th class="cnum">#</th>
          <th class="cmodel">MODEL</th>
          <th class="cprice" style="color: var(--accent2);">가격 (VAT포함)</th>
          <th class="ccat">브랜드/분류</th>
          <th class="cact">주문</th>
        </tr>
      </thead>
      <tbody id="tbody"></tbody>
    </table>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, doc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBLtR1pQsnrl4AJIsy1xkOu68l_jVbAo64",
  authDomain: "pricelist-61f5f.firebaseapp.com",
  projectId: "pricelist-61f5f",
  storageBucket: "pricelist-61f5f.firebasestorage.app",
  messagingSenderId: "1012022631154",
  appId: "1:1012022631154:web:0fb466191ed26c2f2b4e6b"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let DATA = [];
let CART = [];
let CURRENT_FILTER = 'all';

// 카테고리별 컬러 매칭
const CAT_COLORS = {
  '머큐시스': {c:'#00d4ff', b:'rgba(0,212,255,0.3)'},
  '티피링크': {c:'#00ff9d', b:'rgba(0,255,157,0.3)'},
  '아이피타임': {c:'#ff9f43', b:'rgba(255,159,67,0.3)'},
  '기타': {c:'#a78bfa', b:'rgba(167,139,250,0.3)'}
};

function render() {
  const tb = document.getElementById('tbody');
  const q = document.getElementById('search').value.toLowerCase();
  
  // 필터링 로직
  const filtered = DATA.filter(d => {
    const matchSearch = d.model.toLowerCase().includes(q);
    const matchCat = CURRENT_FILTER === 'all' || d.cat === CURRENT_FILTER;
    return matchSearch && matchCat;
  });

  document.getElementById('s-total').textContent = filtered.length;

  tb.innerHTML = filtered.map((d, i) => {
    const col = CAT_COLORS[d.cat] || CAT_COLORS['기타'];
    const isAdded = CART.some(c => c.id === d.id);
    return `
      <tr>
        <td class="cnum">${i + 1}</td>
        <td class="cmodel">${d.model}</td>
        <td class="cprice">${Number(d.price).toLocaleString()}<span class="unit">원</span></td>
        <td class="ccat"><span class="tag" style="color:${col.c}; border-color:${col.b}">${d.cat || '기타'}</span></td>
        <td class="cact">
          <button class="add-btn ${isAdded ? 'added' : ''}" onclick="window.toggleCart(${d.id})">
            ${isAdded ? '✓ 담김' : '+ 담기'}
          </button>
        </td>
      </tr>`;
  }).join('');
}

// 카테고리 버튼 생성
function updateCategoryButtons() {
  const catRow = document.getElementById('cat-row');
  const cats = ['all', ...new Set(DATA.map(d => d.cat).filter(Boolean))];
  
  catRow.innerHTML = cats.map(cat => `
    <button class="fbtn ${CURRENT_FILTER === cat ? 'on' : ''}" onclick="window.setFilter('${cat}')">
      ${cat === 'all' ? '전체보기' : cat}
    </button>
  `).join('');
}

window.setFilter = (cat) => {
  CURRENT_FILTER = cat;
  updateCategoryButtons();
  render();
};

window.toggleCart = (id) => {
  const idx = CART.findIndex(c => c.id === id);
  if(idx > -1) CART.splice(idx, 1);
  else CART.push(DATA.find(d => d.id === id));
  render();
};

onSnapshot(doc(db, 'pricelist', 'data'), snap => {
  if (snap.exists()) {
    DATA = snap.data().items || [];
    updateCategoryButtons();
    render();
  }
  document.getElementById('loading').classList.add('hide');
});

document.getElementById('search').oninput = render;
</script>
</body>
</html>
